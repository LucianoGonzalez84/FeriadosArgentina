<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1425"/>
      <stop offset="100%" style="stop-color:#0f2847"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="50%" style="stop-color:#FCD34D"/>
      <stop offset="100%" style="stop-color:#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>

  <!-- Logo box -->
  <rect x="80" y="70" width="52" height="52" rx="10" fill="#0EA5E9"/>
  <text x="106" y="102" font-family="sans-serif" font-weight="700" font-size="22" fill="white" text-anchor="middle">FA</text>

  <!-- Logo text -->
  <text x="148" y="104" font-family="Georgia, serif" font-weight="600" font-size="26" fill="white">Feriados</text>
  <text x="316" y="104" font-family="Georgia, serif" font-weight="600" font-size="26" fill="#0EA5E9">Argentina</text>

  <!-- Main title -->
  <text x="80" y="230" font-family="Georgia, serif" font-weight="800" font-size="72" fill="white" letter-spacing="-2">Feriados</text>
  <text x="80" y="310" font-family="Georgia, serif" font-weight="800" font-size="72" fill="#0EA5E9" font-style="italic" letter-spacing="-2">Argentina</text>
  <text x="80" y="390" font-family="Georgia, serif" font-weight="800" font-size="72" fill="white" letter-spacing="-2">2026</text>

  <!-- Subtitle -->
  <text x="80" y="450" font-family="sans-serif" font-weight="400" font-size="24" fill="#94A3B8">Calendario completo · Fines largos · Calculadora de puentes</text>

  <!-- Decorative emojis on the right -->
  <text x="900" y="200" font-size="64">🇦🇷</text>
  <text x="1020" y="280" font-size="48">📅</text>
  <text x="920" y="360" font-size="48">🎉</text>
  <text x="1040" y="430" font-size="48">✈️</text>
  <text x="900" y="490" font-size="48">🏖️</text>

  <!-- URL -->
  <rect x="80" y="520" width="300" height="40" rx="8" fill="rgba(14,165,233,0.15)"/>
  <text x="96" y="546" font-family="sans-serif" font-weight="600" font-size="18" fill="#0EA5E9">feriadosargentina.ar</text>

  <!-- Accent line bottom -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#accent)"/>
</svg>
